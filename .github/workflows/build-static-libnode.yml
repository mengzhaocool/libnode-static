# libnode 静态库构建工作流
# 手动触发, 构建 x64 + x86 静态库, 产物为 libnode_static_{arch}.lib
#
# 关键说明:
# - 不使用 "dll" flag, vcbuild.bat 默认静态构建, libnode.lib 为真正的静态库
# - x64 用 Node v26, x86 用 Node v22 (v26 已放弃 32 位 Windows)
# - 合并所有 .lib 为单一静态库 (用 response file 避免命令行过长)

name: Build Static libnode

on:
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version for x64 (e.g., v26.3.0)'
        required: true
        default: 'v26.3.0'

jobs:
  build:
    name: Static lib ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            os: windows-2022
            node_version: ${{ github.event.inputs.node_version || 'v26.3.0' }}
            vcbuild_arch: x64
            python_version: '3.12'
          - arch: x86
            os: windows-2022
            node_version: v22.17.0
            vcbuild_arch: x86
            python_version: '3.12'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install build tools
        shell: pwsh
        run: |
          choco install -y 7zip nasm ninja

      - name: Clone Node.js ${{ matrix.node_version }}
        run: |
          git clone https://github.com/nodejs/node --branch ${{ matrix.node_version }} --depth=1 node

      # x86 需要 V8 补丁: marking-state.h:345 MSVC C2352
      - name: Patch V8 for x86 MSVC
        if: matrix.arch == 'x86'
        shell: pwsh
        run: |
          $file = "node\deps\v8\src\heap\cppgc\marking-state.h"
          $content = Get-Content $file -Raw
          $old = "return MutatorMarkingState::BasicMarkingState::MarkNoPush(header);"
          $new = "return BasicMarkingState::MarkNoPush(header);"
          if ($content -match [regex]::Escape($old)) {
            $content = $content -replace [regex]::Escape($old), $new
            $content | Set-Content $file -NoNewline
            Write-Host "Patched marking-state.h: removed redundant class qualifier"
          } else {
            Write-Host "WARNING: pattern not found in marking-state.h, skipping patch"
          }

      # 静态构建: 不加 dll flag, libnode.lib 会是真正的静态库
      - name: Build (static)
        shell: pwsh
        run: |
          cd node
          Write-Host "Building Node.js ${{ matrix.node_version }} ${{ matrix.vcbuild_arch }} (static)..."
          .\vcbuild.bat release ${{ matrix.vcbuild_arch }}
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Build failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "Build completed successfully"

      - name: Check libnode.lib exists
        shell: pwsh
        run: |
          $libDir = "node\out\Release\lib"
          if (-not (Test-Path $libDir)) {
            Write-Host "ERROR: $libDir not found"
            Get-ChildItem node\out\Release\ | Format-Table Name
            exit 1
          }
          Write-Host "=== Static libs in $libDir ==="
          Get-ChildItem "$libDir\*.lib" | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 1)
            Write-Host ("  {0,-40} {1,8} MB" -f $_.Name, $sizeMB)
          }
          $libnodeLib = "$libDir\libnode.lib"
          if (Test-Path $libnodeLib) {
            $size = (Get-Item $libnodeLib).Length
            Write-Host "`nlibnode.lib found: $([math]::Round($size/1MB,1)) MB (static)"
          } else {
            Write-Host "`nWARNING: libnode.lib NOT found in $libDir"
            Write-Host "Will try to find it elsewhere..."
            Get-ChildItem node\out\Release -Recurse -Filter "libnode.lib" | ForEach-Object {
              Write-Host "  Found: $($_.FullName) ($([math]::Round($_.Length/1MB,1)) MB)"
            }
          }

      - name: Merge static libs
        shell: pwsh
        run: |
          $libDir = "node\out\Release\lib"

          # 排除的库 (测试/工具用, 不需要)
          $exclude = @('gtest', 'v8_nosnapshot', 'v8_init', 'icutools', ' torque')

          # 收集需要的 .lib 文件
          $libs = @()
          Get-ChildItem "$libDir\*.lib" | ForEach-Object {
            $name = $_.Name
            $skip = $false
            foreach ($ex in $exclude) {
              if ($name -match $ex) { $skip = $true; break }
            }
            if (-not $skip) { $libs += $name }
          }

          Write-Host "Merging $($libs.Count) static libraries..."

          # 用 vswhere 查找 lib.exe
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          $libExe = Get-ChildItem "$vsPath\VC\Tools\MSVC\*\bin\Hostx64\${{ matrix.vcbuild_arch }}\lib.exe" |
                    Sort-Object { $_.Directory.Parent.Name } -Descending |
                    Select-Object -First 1 -ExpandProperty FullName

          if (-not $libExe -or -not (Test-Path $libExe)) {
            Write-Host "ERROR: lib.exe not found"
            Write-Host "VS path: $vsPath"
            Get-ChildItem "$vsPath\VC\Tools\MSVC" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
            exit 1
          }
          Write-Host "Using lib.exe: $libExe"

          # 用 response file 避免命令行过长
          # 关键: Push-Location 后 CWD 已是 lib 目录, 只用文件名
          $outName = "libnode_static_${{ matrix.arch }}.lib"
          $rspFile = "$libDir\merge.rsp"
          $rspContent = "/OUT:`"$env:GITHUB_WORKSPACE\$outName`"`n"
          foreach ($lib in $libs) {
            $rspContent += "`"$lib`"`n"
          }
          $rspContent | Set-Content $rspFile -Encoding ascii
          Write-Host "Response file: $rspFile ($($libs.Count) libs)"

          # 执行合并 (CWD = lib 目录, response file 中只有文件名)
          Push-Location $libDir
          & $libExe "@merge.rsp"
          $mergeExit = $LASTEXITCODE
          Pop-Location

          if ($mergeExit -ne 0) {
            Write-Host "Merge failed with exit code $mergeExit"
            exit $mergeExit
          }

          $outFile = "$env:GITHUB_WORKSPACE\$outName"
          if (Test-Path $outFile) {
            $size = (Get-Item $outFile).Length
            Write-Host "`nMerged: $outName = $([math]::Round($size/1MB,1)) MB"
          } else {
            Write-Host "ERROR: Output file not created"
            exit 1
          }

      - name: Download headers
        shell: pwsh
        run: |
          $ver = "${{ matrix.node_version }}"
          $headersUrl = "https://nodejs.org/dist/$ver/node-$ver-headers.tar.gz"
          Write-Host "Downloading headers: $headersUrl"
          Invoke-WebRequest -Uri $headersUrl -OutFile headers.tar.gz
          tar -xzf headers.tar.gz
          $nodeDir = Get-ChildItem -Directory -Filter "node-*" | Select-Object -First 1
          if ($nodeDir) {
            Copy-Item -Recurse "$($nodeDir.Name)\include" libnode-headers
            7z a -mx9 libnode-headers.zip libnode-headers\
            Write-Host "Headers packed: libnode-headers.zip"
          } else {
            Write-Host "ERROR: Could not find extracted node directory"
            exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libnode-static-${{ matrix.arch }}-windows
          path: |
            libnode_static_${{ matrix.arch }}.lib
            libnode-headers.zip

      - name: Verify architecture
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          $dumpbin = Get-ChildItem "$vsPath\VC\Tools\MSVC\*\bin\Hostx64\${{ matrix.vcbuild_arch }}\dumpbin.exe" |
                     Sort-Object { $_.Directory.Parent.Name } -Descending |
                     Select-Object -First 1 -ExpandProperty FullName

          Write-Host "=== Architecture check ==="
          & $dumpbin /headers "libnode_static_${{ matrix.arch }}.lib" |
            Select-String "machine" | Select-Object -First 3

          Write-Host "`n=== Node.js symbols check ==="
          & $dumpbin /symbols "libnode_static_${{ matrix.arch }}.lib" |
            Select-String "InitializeOncePerProcess|CreateEnvironment|SpinEventLoop" |
            Select-Object -First 3
